version: '3.8'

services:
  app1:
    build: .
    container_name: app1
    hostname: app1
    expose:
      - "3000"
    restart: unless-stopped

  app2:
    build: .
    container_name: app2
    hostname: app2
    expose:
      - "3000"
    restart: unless-stopped

  loadbalancer:
    image: nginx:alpine
    container_name: loadbalancer
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    restart: unless-stopped
